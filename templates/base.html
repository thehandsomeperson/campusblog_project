<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}CampusBlog{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">CampusBlog</a>
        <form class="d-flex me-3" method="GET" action="/">
            <label for="search_input" class="visually-hidden">Search</label>
            <input type="text" id="search_input" name="query" placeholder="Search posts..." class="form-control me-2">
            <button class="btn btn-outline-light" type="submit">Search</button>
        </form>
        <div class="navbar-nav ms-auto">
            {% if user.is_authenticated %}
                <a class="nav-link" href="{% url 'blog:create_post' %}">Create Post</a>
                <a class="nav-link" href="{% url 'blog:dashboard' %}">Dashboard</a>
                <form action="{% url 'accounts:logout' %}" method="post">
                    {% csrf_token %}
                    <button class="btn btn-outline-light" type="submit">Logout</button>
                </form>
            {% else %}
                <a class="nav-link" href="{% url 'accounts:login' %}">Login</a>
                <a class="nav-link" href="{% url 'accounts:register' %}">Sign Up</a>
            {% endif %}
        </div>
    </div>
    </nav>

    {% block content %}
    {% endblock %}
</body>
</html>
