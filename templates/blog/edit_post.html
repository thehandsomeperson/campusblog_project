{% extends 'base.html' %}

{% block content %}
    <div class="container mt-4">
        <h5>Edit Post</h5>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label for="id_title">Title</label>
                {{ form.title }}
                {{ form.title.errors }}
            </div>
            <div class="mb-3">
                <label for="id_content">Content</label>
                {{ form.content}}
                {{ form.content.errors }}
            </div>
            <div class="mb-3">
                <label for="id_tags">Tag</label>
                {{ form.tags }}
                {{ form.tags.errors }}
            </div>
            <div class="mb-3">
                <label for="id_new_tags">Add Tags</label>
                {{ form.new_tags }}
                {{ form.new_tags.errors }}
            </div>
            <button type="submit" name="save_draft" class="btn btn-secondary">Save as Draft</button>
            <button type="submit" name="publish_post" class="btn btn-primary">Publish</button>
        </form>
    </div>
{% endblock %}
