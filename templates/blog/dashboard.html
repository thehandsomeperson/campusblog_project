{% extends 'base.html' %}

{% block content %}
    <div class="container mt-4">
        <p>Welcome, {{ request.user }}</p>
        {% for post in posts %}
            <div class="card mb-3">
                <div class="card-body">
                    <p>Title: {{ post.title }} | Status: {{ post.status }} | Update-time: {{ post.update_time }} </p>
                    <a href="{% url 'blog:edit_post' post.id %}" class="btn btn-sm btn-outline-primary">Edit</a>
                    <form class="d-inline" method="post" action="{% url 'blog:delete_post' post.id %}">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                    </form>
                </div>
            </div>
        {% endfor %}
    </div>

{% endblock %}
